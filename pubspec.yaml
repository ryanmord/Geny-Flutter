name: geny_flutter
description: "Geny - AI-powered desktop assistant"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  provider: ^6.1.2

  # WebSocket
  web_socket_channel: ^3.0.2

  # HTTP
  http: ^1.3.0

  # Markdown rendering
  flutter_markdown: ^0.7.7

  # Syntax highlighting
  flutter_highlight: ^0.7.0

  # UUID generation
  uuid: ^4.5.1

  # Path handling
  path: ^1.9.1
  path_provider: ^2.1.5

  # File picker
  file_picker: ^8.1.7

  # URL launcher
  url_launcher: ^6.3.1

  # Window management
  window_manager: ^0.4.3

  # JSON serialization
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Code generation
  build_runner: ^2.4.14
  json_serializable: ^6.9.4

flutter:
  uses-material-design: true
